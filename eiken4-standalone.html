*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:#050D1A;overflow-x:hidden;}
body{font-family:'Nunito',sans-serif;color:#F0F4FF;}
#root{min-height:100vh;}

@keyframes popIn{0%{transform:scale(0.7) rotate(-3deg);opacity:0}60%{transform:scale(1.08) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fadeUp{0%{transform:translateY(24px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,200,66,0.3)}50%{box-shadow:0 0 24px rgba(245,200,66,0.8)}}
@keyframes comboIn{0%{transform:scale(0) translateY(20px);opacity:0}60%{transform:scale(1.2) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0);opacity:0}}
@keyframes rankReveal{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes timerPulse{0%,100%{color:#FF6B6B;transform:scale(1)}50%{color:#ff3333;transform:scale(1.2)}}

.pop-in{animation:popIn 0.35s cubic-bezier(.17,.89,.32,1.28) forwards;}
.shake{animation:shake 0.4s ease;}

.screen{max-width:600px;margin:0 auto;padding:24px 16px;min-height:100vh;padding-bottom:40px;}

.home-hero{background:linear-gradient(160deg,#0D2040 0%,#1a0a30 100%);border-radius:24px;padding:28px 24px;text-align:center;border:1px solid rgba(245,200,66,0.2);position:relative;overflow:hidden;margin-bottom:16px;}
.home-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(245,200,66,0.12),transparent 70%);pointer-events:none;}

.hud{background:linear-gradient(135deg,#0D2040,#0a1525);border-radius:16px;padding:14px 16px;border:1px solid rgba(255,255,255,0.07);margin-bottom:14px;}

.hp-bar-wrap{background:rgba(255,255,255,0.06);border-radius:8px;height:10px;overflow:hidden;}
.hp-bar{height:100%;border-radius:8px;transition:width 0.4s ease,background 0.3s;}

.q-card{background:linear-gradient(145deg,#0E2242,#142d55);border-radius:20px;padding:28px 22px;text-align:center;border:1.5px solid rgba(245,200,66,0.25);margin-bottom:16px;position:relative;overflow:hidden;}
.q-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,0.06),transparent 60%);pointer-events:none;}

.choice{width:100%;padding:15px 18px;border-radius:14px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;color:#F0F4FF;cursor:pointer;transition:all 0.15s;text-align:left;margin-bottom:8px;display:block;}
.choice:hover:not(:disabled){border-color:rgba(78,205,196,0.5);background:rgba(78,205,196,0.06);}
.choice.correct{border-color:#4ECDC4!important;background:rgba(78,205,196,0.15)!important;color:#4ECDC4!important;}
.choice.wrong{border-color:#FF6B6B!important;background:rgba(255,107,107,0.12)!important;color:#FF6B6B!important;animation:shake 0.4s ease;}
.choice:disabled{cursor:default;}

.combo-pop{position:fixed;top:30%;left:50%;transform:translateX(-50%);font-size:28px;font-weight:900;pointer-events:none;animation:comboIn 1s ease forwards;z-index:100;text-shadow:0 0 20px currentColor;white-space:nowrap;}

.btn{border:none;border-radius:14px;padding:16px 24px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:10px;}
.btn:active{transform:scale(0.97);}
.btn-gold{background:linear-gradient(135deg,#F5C842,#E8A820);color:#1a0f00;box-shadow:0 4px 20px rgba(245,200,66,0.3);}
.btn-teal{background:linear-gradient(135deg,#4ECDC4,#2dada4);color:#001a18;box-shadow:0 4px 16px rgba(78,205,196,0.25);}
.btn-purple{background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff;box-shadow:0 4px 16px rgba(167,139,250,0.25);}
.btn-ghost{background:rgba(255,255,255,0.05);color:#7B96B2;border:1.5px solid rgba(255,255,255,0.1);}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-box{background:linear-gradient(145deg,#0D2040,#0a1828);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.07);text-align:center;}

.chip{padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;transition:all 0.15s;background:transparent;color:#7B96B2;margin:3px;}
.chip.on{background:#F5C842;color:#1a0f00;border-color:#F5C842;}

.study-card{background:linear-gradient(145deg,#0E2242,#1a0f30);border-radius:22px;border:2px solid rgba(245,200,66,0.3);padding:40px 24px;text-align:center;cursor:pointer;transition:transform 0.2s;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;overflow:hidden;}

.toggle-wrap{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,0.07);}
.toggle{width:50px;height:28px;border-radius:14px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle-dot{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:white;transition:left 0.2s;}

.speak-btn{background:rgba(78,205,196,0.12);border:1.5px solid rgba(78,205,196,0.4);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;flex-shrink:0;font-size:20px;}

.pb{background:rgba(255,255,255,0.07);border-radius:8px;height:6px;overflow:hidden;margin-bottom:14px;}
.pb-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#4ECDC4,#F5C842);transition:width 0.35s ease;}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.cal-day{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.rank-badge{font-size:80px;font-weight:900;font-family:'Space Mono',monospace;animation:rankReveal 0.6s cubic-bezier(.17,.89,.32,1.28) forwards;display:block;}
.timer-danger{animation:timerPulse 0.5s ease infinite;}

.section-box{background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.06);margin-bottom:12px;}
details summary{cursor:pointer;color:#7B96B2;font-size:13px;padding:8px 0;list-style:none;}
details summary::-webkit-details-marker{display:none;}
</style>

const QN=20;
const todayStr=()=>new Date().toISOString().slice(0,10);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const getWrong=(cor,pool)=>shuffle(pool.filter(w=>w.id!==cor.id)).slice(0,3);
const RANKS=[{min:95,l:"S",col:"#FFD700",bg:"rgba(255,215,0,0.15)",em:"👑"},{min:80,l:"A",col:"#4ECDC4",bg:"rgba(78,205,196,0.15)",em:"🌟"},{min:65,l:"B",col:"#60A5FA",bg:"rgba(96,165,250,0.15)",em:"⭐"},{min:50,l:"C",col:"#F5C842",bg:"rgba(245,200,66,0.15)",em:"👍"},{min:0,l:"D",col:"#FF6B6B",bg:"rgba(255,107,107,0.15)",em:"💪"}];
const getRank=s=>RANKS.find(r=>s>=r.min);
const COMBO_MSGS=["ナイス！","すごい！","やるね！","コンボ！","最高！","天才！","パーフェクト！"];

function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang="en-US";u.rate=0.85;u.pitch=1.0;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang.startsWith("en-US"))||vs.find(v=>v.lang.startsWith("en"));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

const LS_KEY="eiken4_v3";
function loadData(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):{sessions:[],studiedWords:{},mistakeIds:[],bestScores:{}};}catch{return{sessions:[],studiedWords:{},mistakeIds:[],bestScores:{}};}}
function saveData(d){try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch{}}

function App(){
  const[screen,setScreen]=useState("home");
  const[data,setData]=useState(null);
  const[catFilter,setCatFilter]=useState("すべて");
  const[autoSpeak,setAutoSpeak]=useState(true);
  const[studyWords,setStudyWords]=useState([]);
  const[studyIdx,setStudyIdx]=useState(0);
  const[flipped,setFlipped]=useState(false);
  const[quizWords,setQuizWords]=useState([]);
  const[quizIdx,setQuizIdx]=useState(0);
  const[choices,setChoices]=useState([]);
  const[selected,setSelected]=useState(null);
  const[okCount,setOkCount]=useState(0);
  const[combo,setCombo]=useState(0);
  const[maxCombo,setMaxCombo]=useState(0);
  const[hp,setHp]=useState(100);
  const[score,setScore]=useState(0);
  const[comboMsg,setComboMsg]=useState(null);
  const[quizResults,setQuizResults]=useState([]);
  const[isReview,setIsReview]=useState(false);
  const[timeLeft,setTimeLeft]=useState(null);
  const[timerOn,setTimerOn]=useState(false);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}
    setData(loadData());
  },[]);

  const persist=useCallback(nd=>{setData(nd);saveData(nd);},[]);
  const filtered=catFilter==="すべて"?WORDS:WORDS.filter(w=>w.c===catFilter);
  const cats=["すべて","名詞","動詞","形容詞","副詞","前置詞","熟語"];

  useEffect(()=>{
    if(screen==="quiz"&&timerOn&&timeLeft!==null){
      if(timeLeft<=0){if(selected===null)handleChoice(null,true);return;}
      timerRef.current=setInterval(()=>setTimeLeft(t=>t-1),1000);
      return()=>clearInterval(timerRef.current);
    }
  },[screen,timerOn,timeLeft,quizIdx]);

  const startStudy=(wl=null)=>{
    const words=shuffle(wl||filtered).slice(0,QN);
    setStudyWords(words);setStudyIdx(0);setFlipped(false);setScreen("study");
    if(autoSpeak)setTimeout(()=>speak(words[0].en),350);
  };

  const nextStudy=()=>{
    if(studyIdx<studyWords.length-1){
      const ni=studyIdx+1;setStudyIdx(ni);setFlipped(false);
      if(autoSpeak)setTimeout(()=>speak(studyWords[ni].en),280);
    }else{
      const nd={...data};const d=todayStr();
      if(!nd.studiedWords)nd.studiedWords={};
      studyWords.forEach(w=>{nd.studiedWords[w.id]=(nd.studiedWords[w.id]||0)+1;});
      const ses=nd.sessions.find(s=>s.date===d&&s.type==="study");
      if(ses)ses.count=(ses.count||0)+studyWords.length;
      else nd.sessions.push({date:d,type:"study",count:studyWords.length});
      persist(nd);setScreen("home");
    }
  };

  const startQuiz=(reviewMode=false,withTimer=false)=>{
    let wl;
    if(reviewMode){const mw=WORDS.filter(w=>(data.mistakeIds||[]).includes(w.id));if(!mw.length)return;wl=shuffle(mw).slice(0,Math.min(QN,mw.length));}
    else wl=shuffle(filtered).slice(0,QN);
    setIsReview(reviewMode);setTimerOn(withTimer);
    setQuizWords(wl);setQuizIdx(0);setOkCount(0);setCombo(0);setMaxCombo(0);
    setHp(100);setScore(0);setComboMsg(null);setQuizResults([]);setSelected(null);
    setChoices(shuffle([wl[0],...getWrong(wl[0],WORDS)]));
    if(withTimer)setTimeLeft(15);
    setScreen("quiz");
    if(autoSpeak)setTimeout(()=>speak(wl[0].en),350);
  };

  const handleChoice=(choice,timeout=false)=>{
    if(selected!==null)return;
    clearInterval(timerRef.current);
    const cur=quizWords[quizIdx];
    const isOK=!timeout&&choice&&choice.id===cur.id;
    setSelected(timeout?-1:(choice?.id??-1));
    let pts=0;
    if(isOK){
      const nc=combo+1,nm=Math.max(maxCombo,nc);
      pts=100+(nc>=3?(nc-2)*20:0)+(timerOn&&timeLeft>10?30:timerOn&&timeLeft>5?15:0);
      setOkCount(c=>c+1);setCombo(nc);setMaxCombo(nm);setScore(s=>s+pts);
      if(nc>=3){setComboMsg({text:`${nc} COMBO! ${COMBO_MSGS[Math.min(nc-3,COMBO_MSGS.length-1)]}`,col:"#F5C842"});setTimeout(()=>setComboMsg(null),900);}
    }else{setCombo(0);setHp(h=>Math.max(0,h-(timeout?15:10)));}
    const nd={...data};nd.mistakeIds=nd.mistakeIds||[];
    if(!isOK){if(!nd.mistakeIds.includes(cur.id))nd.mistakeIds=[...nd.mistakeIds,cur.id];}
    else nd.mistakeIds=nd.mistakeIds.filter(id=>id!==cur.id);
    setData(nd);
    setQuizResults(r=>[...r,{word:cur,isOK,chosen:choice}]);
    const delay=isOK?700:1000;
    setTimeout(()=>{
      if(quizIdx<quizWords.length-1){
        const ni=quizIdx+1,next=quizWords[ni];
        setChoices(shuffle([next,...getWrong(next,WORDS)]));setQuizIdx(ni);setSelected(null);
        if(timerOn)setTimeLeft(15);
        if(autoSpeak)setTimeout(()=>speak(next.en),280);
      }else{
        const fOK=isOK?okCount+1:okCount;
        const pct=Math.round((fOK/quizWords.length)*100);
        const fs=score+pts;
        nd.sessions=nd.sessions||[];
        nd.sessions.push({date:todayStr(),type:"quiz",score:pct,gameScore:fs,total:quizWords.length,correct:fOK,category:catFilter,review:isReview});
        if(!nd.bestScores)nd.bestScores={};
        const key=isReview?"review":catFilter;
        if(!nd.bestScores[key]||fs>nd.bestScores[key])nd.bestScores[key]=fs;
        persist(nd);setScore(fs);setOkCount(fOK);setScreen("results");
      }
    },delay);
  };

  if(!data)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}},
    React.createElement("div",{style:{color:"#4ECDC4",fontSize:20}},"⚡ 読み込み中…"));

  const mistakeCount=(data.mistakeIds||[]).length;
  const h=React.createElement;

  // ── HOME ─────────────────────────────────────────────────────────
  if(screen==="home"){
    const qs=data.sessions.filter(s=>s.type==="quiz");
    const last=qs.length?qs[qs.length-1]:null;
    const best=data.bestScores?.[catFilter==="すべて"?"すべて":catFilter]||0;
    const allDates=[...new Set(data.sessions.map(s=>s.date))].sort();
    let streak=0;let chk=new Date(todayStr());
    while(true){const ds=chk.toISOString().slice(0,10);if(allDates.includes(ds)){streak++;chk.setDate(chk.getDate()-1);}else break;}

    return h("div",{style:{background:"#050D1A",minHeight:"100vh"}},
      h("div",{className:"screen"},
        h("div",{className:"home-hero"},
          h("div",{style:{fontSize:56,marginBottom:8}},"⚡"),
          h("h1",{style:{fontFamily:"'Space Mono',monospace",fontSize:22,color:"#F5C842",marginBottom:4,fontWeight:700}},"英検4級バトル"),
          h("p",{style:{color:"#7B96B2",fontSize:12,marginBottom:16}},WORDS.length+"語収録 · 20問チャレンジ"),
          h("div",{style:{display:"flex",justifyContent:"center",gap:24}},
            [{v:streak,l:"連続",u:"日",col:"#F5C842"},{v:last?.score??"-",l:"最新",u:last?"点":""},{v:best||"-",l:"最高",u:best?"pt":"",col:"#A78BFA"}].map(x=>
              h("div",{key:x.l,style:{textAlign:"center"}},
                h("div",{style:{fontSize:22,fontWeight:900,color:x.col||"#4ECDC4"}},x.v,h("span",{style:{fontSize:11,color:"#7B96B2"}},x.u)),
                h("div",{style:{fontSize:10,color:"#7B96B2"}},x.l))))),

        mistakeCount>0&&h("div",{style:{background:"linear-gradient(135deg,rgba(167,139,250,0.12),rgba(124,58,237,0.08))",border:"1.5px solid rgba(167,139,250,0.35)",borderRadius:14,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}},
          h("div",null,h("div",{style:{fontSize:13,fontWeight:900,color:"#A78BFA"}},"🔁 苦手単語があります"),h("div",{style:{fontSize:11,color:"#7B96B2",marginTop:2}},mistakeCount+"語 · 集中特訓しよう！")),
          h("button",{className:"btn btn-purple",style:{width:"auto",padding:"8px 14px",fontSize:12,marginBottom:0},onClick:()=>startQuiz(true,false)},"特訓 ›")),

        h("div",{style:{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:14}},
          h("div",{style:{fontSize:12,fontWeight:700,marginBottom:8}},"📂 カテゴリ"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},cats.map(c=>
            h("button",{key:c,className:`chip ${catFilter===c?"on":""}`,onClick:()=>setCatFilter(c)},c," ",h("span",{style:{opacity:0.6}},"("+(c==="すべて"?WORDS.length:WORDS.filter(w=>w.c===c).length)+")")
          ))),
          h("div",{style:{fontSize:10,color:"#7B96B2",marginTop:6}},"対象: "+filtered.length+"語")),

        h("div",{className:"toggle-wrap",style:{marginBottom:14}},
          h("div",null,h("div",{style:{fontSize:13,fontWeight:700}},"🔊 自動読み上げ"),h("div",{style:{fontSize:11,color:"#7B96B2"}},"問題が出るたびに発音します")),
          h("div",{className:"toggle",style:{background:autoSpeak?"#4ECDC4":"rgba(255,255,255,0.1)"},onClick:()=>setAutoSpeak(!autoSpeak)},
            h("div",{className:"toggle-dot",style:{left:autoSpeak?26:3}}))),

        h("button",{className:"btn btn-gold",onClick:()=>startQuiz(false,false)},"⚡ テストバトル（20問）"),
        h("button",{className:"btn btn-teal",onClick:()=>startQuiz(false,true)},"⏱️ タイムアタック（15秒制限）"),
        h("button",{className:"btn btn-ghost",onClick:()=>startStudy()},"📖 単語を学習する"),
        mistakeCount>0&&h("button",{className:"btn btn-purple",onClick:()=>startQuiz(true,false)},"🔁 苦手だけテスト（"+mistakeCount+"語）"),
        h("button",{className:"btn btn-ghost",onClick:()=>setScreen("dashboard")},"📊 記録・ランキング")));
  }

  // ── STUDY ────────────────────────────────────────────────────────
  if(screen==="study"){
    const word=studyWords[studyIdx];
    const prog=((studyIdx+1)/studyWords.length)*100;
    const isMistake=(data.mistakeIds||[]).includes(word.id);
    return h("div",{style:{background:"#050D1A",minHeight:"100vh"}},h("div",{className:"screen"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("button",{onClick:()=>setScreen("home"),style:{background:"none",border:"none",color:"#7B96B2",cursor:"pointer",fontSize:14}},"← もどる"),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          isMistake&&h("span",{style:{fontSize:10,color:"#A78BFA",fontWeight:700,background:"rgba(167,139,250,0.15)",padding:"2px 8px",borderRadius:8}},"苦手"),
          h("span",{style:{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#7B96B2"}},(studyIdx+1)+"/"+studyWords.length))),
      h("div",{className:"pb"},h("div",{className:"pb-fill",style:{width:prog+"%"}})),
      h("p",{style:{textAlign:"center",color:"#7B96B2",fontSize:13,marginBottom:12}},"カードをタップして日本語を確認しよう"),

        h("span",{style:{background:"rgba(78,205,196,0.1)",color:"#4ECDC4",padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700}},word.c),

  if(screen==="quiz"){

            h("span",{style:{fontSize:11,color:hpCol,fontWeight:700,width:30,textAlign:"right"}},hp)),
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("span",{style:{fontSize:11,color:"#7B96B2"}},(quizIdx+1)+"/"+quizWords.length+"問"),
            timerOn&&h("span",{className:timeLeft<=5?"timer-danger":"",style:{fontFamily:"'Space Mono',monospace",fontSize:17,fontWeight:700,color:timeLeft<=5?"#FF6B6B":"#4ECDC4"}},"⏱"+timeLeft),
            h("span",{style:{fontSize:11,color:"#7B96B2"}},"正解 "+okCount+"問")),
          timerOn&&h("div",{className:"pb",style:{marginBottom:0,marginTop:6,height:4}},
            h("div",{className:"pb-fill",style:{width:((timeLeft/15)*100)+"%",background:timeLeft<=5?"#FF6B6B":undefined,transition:"width 1s linear"}}))),

        h("div",{className:"q-card pop-in",key:word.id},
          h("span",{style:{background:"rgba(78,205,196,0.1)",color:"#4ECDC4",padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700,display:"inline-block",marginBottom:10}},word.c),
          h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:12}},
            h("p",{style:{fontFamily:"'Space Mono',monospace",fontSize:32,fontWeight:700,color:"#F5C842",margin:0}},word.en),
            h("button",{className:"speak-btn",onClick:()=>speak(word.en)},"🔊")),
          h("p",{style:{color:"#7B96B2",fontSize:13,margin:"8px 0 0"}},"日本語の意味を選ぼう")),

        h("div",{key:"ch-"+quizIdx},choices.map((c,i)=>{
          let cls="choice";
          if(selected!==null){if(c.id===word.id)cls+=" correct";else if(c.id===selected)cls+=" wrong";}
          return h("button",{key:c.id,className:cls,onClick:()=>handleChoice(c),disabled:selected!==null},
            h("span",{style:{color:"rgba(255,255,255,0.3)",marginRight:10,fontFamily:"'Space Mono',monospace",fontSize:12}},["A","B","C","D"][i]),
            c.ja,selected!==null&&c.id===word.id&&" ✓");
        }))));
  }

  // ── RESULTS ──────────────────────────────────────────────────────
  if(screen==="results"){
    const pct=Math.round((okCount/quizWords.length)*100);
    const rank=getRank(pct);
    const mistakes=quizResults.filter(r=>!r.isOK);
    const isBest=data.bestScores?.[isReview?"review":catFilter]===score;
    return h("div",{style:{background:"#050D1A",minHeight:"100vh"}},h("div",{className:"screen",style:{textAlign:"center"}},
      h("div",{style:{background:rank.bg,border:"2px solid "+rank.col,borderRadius:24,padding:"28px 20px",marginBottom:16,position:"relative"}},
        isBest&&h("div",{style:{position:"absolute",top:10,right:14,fontSize:11,fontWeight:900,color:"#F5C842",background:"rgba(245,200,66,0.15)",padding:"2px 8px",borderRadius:8}},"🏆 NEW BEST!"),
        h("div",{style:{fontSize:11,color:"#7B96B2",marginBottom:4}},"ランク"),
        h("span",{className:"rank-badge",style:{color:rank.col}},rank.l),
        h("div",{style:{fontSize:24,marginBottom:4}},rank.em),
        h("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:52,fontWeight:700,color:rank.col,lineHeight:1}},pct,h("span",{style:{fontSize:16}},"%")),
        h("div",{style:{color:"#7B96B2",fontSize:13}},okCount+"/"+quizWords.length+"問正解"),
        h("div",{style:{display:"flex",justifyContent:"center",gap:24,marginTop:14}},
          [{v:score,u:"pt",l:"スコア",col:"#F5C842"},{v:maxCombo+"🔥",u:"",l:"最大コンボ",col:"#4ECDC4"},{v:quizWords.length-okCount,u:"問",l:"ミス",col:"#A78BFA"}].map(x=>
            h("div",{key:x.l},h("div",{style:{fontSize:18,fontWeight:900,color:x.col}},x.v,h("span",{style:{fontSize:11}},x.u)),h("div",{style:{fontSize:10,color:"#7B96B2"}},x.l))))),

      mistakes.length>0&&h("div",{style:{background:"rgba(255,107,107,0.07)",border:"1.5px solid rgba(255,107,107,0.2)",borderRadius:16,padding:"14px 16px",marginBottom:16,textAlign:"left"}},
        h("div",{style:{fontSize:13,fontWeight:700,color:"#FF6B6B",marginBottom:8}},"❌ 間違えた単語（"+mistakes.length+"語）"),
        mistakes.map((r,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:i<mistakes.length-1?"1px solid rgba(255,255,255,0.05)":"none"}},
          h("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:0},onClick:()=>speak(r.word.en)},"🔊"),
          h("span",{style:{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#F0F4FF",fontWeight:700}},r.word.en),
          h("span",{style:{color:"#7B96B2",fontSize:11}},"= "+r.word.ja)))),

      h("button",{className:"btn btn-gold",onClick:()=>startQuiz(false,false)},"⚡ もう一度バトル"),
      h("button",{className:"btn btn-teal",onClick:()=>startQuiz(false,true)},"⏱️ タイムアタック"),
      (data.mistakeIds?.length||0)>0&&h("button",{className:"btn btn-purple",onClick:()=>startQuiz(true,false)},"🔁 苦手テスト（"+data.mistakeIds.length+"語）"),
      mistakes.length>0&&h("button",{className:"btn btn-ghost",onClick:()=>startStudy(mistakes.map(r=>r.word))},"📖 間違い単語を学習"),
      h("button",{className:"btn btn-ghost",onClick:()=>setScreen("home")},"🏠 ホームへ")));
  }

  // ── DASHBOARD ────────────────────────────────────────────────────
  if(screen==="dashboard"){
    const qs=data.sessions.filter(s=>s.type==="quiz");
    const allDates=[...new Set(data.sessions.map(s=>s.date))].sort();
    let streak=0;let chk=new Date(todayStr());
    while(true){const ds=chk.toISOString().slice(0,10);if(allDates.includes(ds)){streak++;chk.setDate(chk.getDate()-1);}else break;}
    const avg=qs.length?Math.round(qs.reduce((s,q)=>s+q.score,0)/qs.length):0;
    const totalPts=qs.reduce((s,q)=>s+(q.gameScore||0),0);
    const mw=WORDS.filter(w=>(data.mistakeIds||[]).includes(w.id));
    const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().slice(0,10);});
    const today=todayStr();
    const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
    const dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
    const moDates=data.sessions.map(s=>s.date);
    const recentQ=qs.slice(-10);

    return h("div",{style:{background:"#050D1A",minHeight:"100vh"}},h("div",{className:"screen"},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:18}},
        h("button",{onClick:()=>setScreen("home"),style:{background:"none",border:"none",color:"#7B96B2",cursor:"pointer",fontSize:14}},"← もどる"),
        h("h2",{style:{margin:0,fontFamily:"'Space Mono',monospace",fontSize:18,color:"#F5C842"}},"📊 記録")),

      h("div",{className:"stat-grid"},
        [{icon:"🔥",l:"連続学習",v:streak,u:"日"},{icon:"⭐",l:"平均スコア",v:avg,u:"点"},{icon:"💎",l:"総獲得pt",v:totalPts.toLocaleString(),u:""},{icon:"🔁",l:"苦手単語",v:mw.length,u:"語",col:"#A78BFA"}].map(s=>
          h("div",{key:s.l,className:"stat-box"},
            h("div",{style:{display:"flex",alignItems:"center",gap:5,marginBottom:4}},h("span",{style:{fontSize:18}},s.icon),h("span",{style:{fontSize:10,color:"#7B96B2"}},s.l)),
            h("div",{style:{fontSize:24,fontWeight:900,color:s.col||"#F5C842"}},s.v,h("span",{style:{fontSize:11,color:"#7B96B2"}},s.u))))),

      h("div",{className:"section-box"},
        h("p",{style:{margin:"0 0 10px",fontSize:13,fontWeight:700}},"📈 スコア推移"),
        recentQ.length===0
          ?h("p",{style:{color:"#7B96B2",fontSize:12,textAlign:"center"}},"まだテストがありません")
          :h("div",{style:{display:"flex",alignItems:"flex-end",gap:3,height:72}},
            recentQ.map((s,i)=>{const r=getRank(s.score);return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
              h("span",{style:{fontSize:8,color:r.col,fontWeight:700}},s.score),
              h("div",{style:{width:"100%",height:((s.score/100)*52)+"px",borderRadius:"3px 3px 0 0",background:r.col,minHeight:3}}))}))),

      h("div",{className:"section-box"},
        h("p",{style:{margin:"0 0 10px",fontSize:13,fontWeight:700}},"📅 直近7日"),
        h("div",{style:{display:"flex",gap:5,justifyContent:"space-between"}},
          last7.map(d=>{
            const hasSt=data.sessions.some(s=>s.date===d&&s.type==="study");
            const hasQz=data.sessions.some(s=>s.date===d&&s.type==="quiz");
            const isT=d===today;
            return h("div",{key:d,style:{flex:1,textAlign:"center"}},
              h("div",{style:{fontSize:9,color:"#7B96B2",marginBottom:2}},["日","月","火","水","木","金","土"][new Date(d).getDay()]+" "),
              h("div",{className:"cal-day",style:{margin:"0 auto",background:hasSt&&hasQz?"#F5C842":hasSt?"#4ECDC4":hasQz?"#60A5FA":"rgba(255,255,255,0.05)",color:(hasSt||hasQz)?"#0a1020":"#7B96B2",border:isT?"2px solid #F5C842":"2px solid transparent"}},
                parseInt(d.slice(8))))}))),

      h("div",{className:"section-box"},
        h("p",{style:{margin:"0 0 10px",fontSize:13,fontWeight:700}},yr+"年"+(mo+1)+"月"),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
          ["日","月","火","水","木","金","土"].map(d=>h("div",{key:d,style:{textAlign:"center",fontSize:9,color:"#7B96B2",paddingBottom:2}},d)),
          Array.from({length:fd}).map((_,i)=>h("div",{key:"e"+i})),
          Array.from({length:dim},(_,i)=>{
            const ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(i+1).padStart(2,"0");
            const done=moDates.includes(ds),isT=ds===today;
            return h("div",{key:i,style:{textAlign:"center",fontSize:11,padding:"4px 0",borderRadius:5,background:done?"#F5C842":isT?"rgba(245,200,66,0.1)":"transparent",color:done?"#0a1020":isT?"#F5C842":"#7B96B2",fontWeight:done||isT?700:400,border:isT&&!done?"1px solid #F5C842":"1px solid transparent"}},i+1)}))),

      mw.length>0&&h("div",{style:{background:"rgba(167,139,250,0.06)",borderRadius:14,padding:"14px",border:"1px solid rgba(167,139,250,0.2)",marginBottom:12}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("p",{style:{margin:0,fontSize:13,fontWeight:700,color:"#A78BFA"}},"🔁 苦手単語（"+mw.length+"語）"),
          h("button",{onClick:()=>{const nd={...data,mistakeIds:[]};persist(nd);},style:{background:"none",border:"1px solid #7B96B2",borderRadius:8,padding:"2px 8px",color:"#7B96B2",cursor:"pointer",fontSize:10}},"リセット")),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}},
          mw.slice(0,20).map(w=>h("div",{key:w.id,style:{display:"flex",alignItems:"center",gap:3,background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.25)",borderRadius:8,padding:"3px 8px"}},
            h("span",{style:{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#A78BFA",fontWeight:700}},w.en),
            h("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:0},onClick:()=>speak(w.en)},"🔊"))),
          mw.length>20&&h("span",{style:{fontSize:10,color:"#7B96B2",alignSelf:"center"}},"他"+(mw.length-20)+"語")),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{className:"btn btn-purple",style:{fontSize:13},onClick:()=>startStudy(mw)},"📖 学習"),
          h("button",{className:"btn btn-purple",style:{fontSize:13},onClick:()=>startQuiz(true,false)},"⚡ テスト"))),

      qs.length>0&&h("div",{className:"section-box"},
        h("p",{style:{margin:"0 0 10px",fontSize:13,fontWeight:700}},"📋 テスト履歴"),
        qs.slice(-8).reverse().map((s,i)=>{
          const r=getRank(s.score);
          return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<7?"1px solid rgba(255,255,255,0.04)":"none"}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{fontSize:11,color:"#7B96B2"}},s.date),
              s.review&&h("span",{className:"badge",style:{background:"rgba(167,139,250,0.15)",color:"#A78BFA"}},"復習")),
            h("span",{className:"badge",style:{background:r.bg,color:r.col,fontSize:12}},r.l+" "+s.score+"%"))})),

      h("button",{className:"btn btn-gold",onClick:()=>startQuiz(false,false)},"⚡ テストバトル"),
      h("button",{className:"btn btn-ghost",onClick:()=>setScreen("home")},"🏠 ホームへ")));
  }

  return null;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
