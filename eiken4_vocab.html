// 発音
// ── 音声読み上げ ──────────────────────────────────────────────────
// Artifact iframe内ではspeechSynthesisが使える場合もある
// 自動読み上げキュー: RV読み込み前にspeakが呼ばれた場合に備える
let _pendingSpeak = null;

function loadResponsiveVoice(onReady) {
  if (window.responsiveVoice) { onReady && onReady(); return; }
  if (document.getElementById("rv-script")) {
    // すでに読み込み中 → 完了を待つ
    const check = setInterval(() => {
      if (window.responsiveVoice) { clearInterval(check); onReady && onReady(); }
    }, 100);
    return;
  }
  const s = document.createElement("script");
  s.id = "rv-script";
  s.src = "https://code.responsivevoice.org/responsivevoice.js?key=FREE";
  s.onload = () => {
    const check = setInterval(() => {
      if (window.responsiveVoice) {
        clearInterval(check);
        onReady && onReady();
      }
    }, 100);
  };
  document.head.appendChild(s);
}

function speak(text) {
  if (!text) return;

  // ResponsiveVoiceが使える場合
  if (window.responsiveVoice) {
    try {
      window.responsiveVoice.cancel();
      window.responsiveVoice.speak(text, "US English Female", { rate: 0.9, volume: 1 });
      return;
    } catch(e) {}
  }

  // Web Speech API フォールバック
  try {
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.82;
      u.volume = 1.0;
      window.speechSynthesis.speak(u);
      return;
    }
  } catch(e) {}

  // まだ読み込み中なら pending に入れて RV 準備完了後に再生
  _pendingSpeak = text;
  loadResponsiveVoice(() => {
    if (_pendingSpeak) {
      const t = _pendingSpeak;
      _pendingSpeak = null;
      speak(t);
    }
  });
}

// ストレージ
// mistakeMap: { [wordId]: { addedDate: "YYYY-MM-DD", count: N, mastered: false } }
function loadData() {
  try {
    const raw = localStorage.getItem("eiken4_v4");
    if (raw) {
      const d = JSON.parse(raw);
      if (!d.mistakeMap) d.mistakeMap = {};
      if (d.mistakeIds && !Object.keys(d.mistakeMap).length) {
        d.mistakeIds.forEach(id => { d.mistakeMap[id] = {addedDate:"2000-01-01",count:1,mastered:false}; });
      }
      return d;
    }
    return {sessions:[],studiedWords:{},mistakeMap:{},bestScores:{}};
  } catch { return {sessions:[],studiedWords:{},mistakeMap:{},bestScores:{}}; }
}
function saveData(d) { try{ localStorage.setItem("eiken4_v4", JSON.stringify(d)); }catch{} }

// ─── SpeakBtn コンポーネント ──────────────────────────────────────
function SpeakBtn({ text, large }) {
  const [state, setState] = useState("idle"); // idle | speaking | error

  const handleClick = () => {
    if (!window.speechSynthesis) {
      setState("error");
      setTimeout(() => setState("idle"), 2000);
      return;
    }
    setState("speaking");
    window.speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      u.rate = 0.8;
      u.volume = 1.0;
      u.onend = () => setState("idle");
      u.onerror = () => setState("error");
      window.speechSynthesis.speak(u);
      // フォールバック: 3秒後に自動でidle戻し
      setTimeout(() => setState("idle"), 3000);
    }, 50);
  };

  const bg = state === "speaking"
    ? "rgba(78,205,196,0.35)"
    : state === "error"
    ? "rgba(255,107,107,0.2)"
    : "rgba(78,205,196,0.12)";
  const icon = state === "speaking" ? "🔉" : state === "error" ? "🔇" : "🔊";
  const size = large ? 52 : 40;
  const fontSize = large ? 22 : 18;

  return (
    <button
      onClick={handleClick}
      style={{
        background: bg,
        border: `1.5px solid ${state === "error" ? "rgba(255,107,107,0.4)" : "rgba(78,205,196,0.4)"}`,
        borderRadius: "50%",
        width: size, height: size,
        display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer",
        fontSize: fontSize,
        transition: "all 0.15s",
        flexShrink: 0,
        animation: state === "speaking" ? "pulse 0.8s ease infinite" : "none",
      }}
    >
      {icon}
    </button>
  );
}

    @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,200,66,0.3)}50%{box-shadow:0 0 24px rgba(245,200,66,0.8)}}
    @keyframes comboIn{0%{transform:scale(0) translateY(20px);opacity:0}60%{transform:scale(1.2) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0);opacity:0}}
    @keyframes starBurst{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
    @keyframes timerPulse{0%,100%{color:#FF6B6B;transform:scale(1)}50%{color:#ff3333;transform:scale(1.2)}}
    @keyframes hpShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    @keyframes slideDown{0%{transform:translateY(-30px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes rankReveal{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
    
    .pop-in{animation:popIn 0.35s cubic-bezier(.17,.89,.32,1.28) forwards;}
    .fade-up{animation:fadeUp 0.3s ease forwards;}
    .shake{animation:shake 0.4s ease;}
    
    .screen{max-width:540px;margin:0 auto;padding:20px 14px;min-height:100vh;}
    
    /* ホームカード */
    .home-hero{background:linear-gradient(160deg,#0D2040 0%,#1a0a30 100%);border-radius:24px;padding:28px 24px;text-align:center;border:1px solid rgba(245,200,66,0.2);position:relative;overflow:hidden;margin-bottom:16px;}
    .home-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(245,200,66,0.12),transparent 70%);pointer-events:none;}
    
    /* ゲーム用HUD */
    .hud{background:linear-gradient(135deg,#0D2040,#0a1525);border-radius:16px;padding:14px 16px;border:1px solid rgba(255,255,255,0.07);margin-bottom:14px;}
    
    /* HPバー */
    .hp-bar-wrap{background:rgba(255,255,255,0.06);border-radius:8px;height:10px;overflow:hidden;position:relative;}
    .hp-bar{height:100%;border-radius:8px;transition:width 0.4s ease,background 0.3s;position:relative;}
    .hp-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.25);border-radius:8px 8px 0 0;}
    
    /* 問題カード */
    .q-card{background:linear-gradient(145deg,#0E2242,#142d55);border-radius:20px;padding:28px 22px;text-align:center;border:1.5px solid rgba(245,200,66,0.25);margin-bottom:16px;position:relative;overflow:hidden;}
    .q-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,0.06),transparent 60%);pointer-events:none;}
    
    /* 選択肢ボタン */
    .choice{width:100%;padding:15px 18px;border-radius:14px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#F0F4FF;cursor:pointer;transition:all 0.15s;text-align:left;margin-bottom:8px;position:relative;overflow:hidden;}
    .choice:hover:not(:disabled){border-color:rgba(78,205,196,0.5);background:rgba(78,205,196,0.06);transform:translateX(3px);}
    .choice.correct{border-color:#4ECDC4!important;background:rgba(78,205,196,0.15)!important;color:#4ECDC4!important;animation:glow 0.6s ease;}
    .choice.wrong{border-color:#FF6B6B!important;background:rgba(255,107,107,0.12)!important;color:#FF6B6B!important;animation:shake 0.4s ease;}
    .choice:disabled{cursor:default;}
    
    /* コンボ演出 */
    .combo-pop{position:fixed;top:30%;left:50%;transform:translateX(-50%);font-size:28px;font-weight:900;pointer-events:none;animation:comboIn 1s ease forwards;z-index:100;text-shadow:0 0 20px currentColor;white-space:nowrap;}
    
    /* 大ボタン */
    .btn{border:none;border-radius:14px;padding:15px 24px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-bottom:10px;}
    .btn:hover{transform:translateY(-2px);}
    .btn:active{transform:translateY(0);}
    .btn-gold{background:linear-gradient(135deg,#F5C842,#E8A820);color:#1a0f00;box-shadow:0 4px 20px rgba(245,200,66,0.3);}
    .btn-gold:hover{box-shadow:0 8px 28px rgba(245,200,66,0.5);}
    .btn-teal{background:linear-gradient(135deg,#4ECDC4,#2dada4);color:#001a18;box-shadow:0 4px 16px rgba(78,205,196,0.25);}
    .btn-purple{background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff;box-shadow:0 4px 16px rgba(167,139,250,0.25);}
    .btn-ghost{background:rgba(255,255,255,0.05);color:#7B96B2;border:1.5px solid rgba(255,255,255,0.1);}
    .btn-ghost:hover{background:rgba(255,255,255,0.09);color:#F0F4FF;}
    
    /* 統計カード */
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
    .stat-box{background:linear-gradient(145deg,#0D2040,#0a1828);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.07);text-align:center;}
    
    /* カテゴリチップ */
    .chip{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;transition:all 0.15s;background:transparent;color:#7B96B2;}
    .chip.on{background:#F5C842;color:#1a0f00;border-color:#F5C842;}
    
    /* 学習カード */
    .study-card{background:linear-gradient(145deg,#0E2242,#1a0f30);border-radius:22px;border:2px solid rgba(245,200,66,0.3);padding:36px 24px;text-align:center;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;overflow:hidden;}
    .study-card:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(245,200,66,0.15);}
    .study-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,200,66,0.07),transparent 65%);pointer-events:none;}
    
    /* トグル */
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 16px;border:1px solid rgba(255,255,255,0.07);}
    .toggle{width:46px;height:25px;border-radius:13px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
    .toggle-dot{position:absolute;top:3px;width:19px;height:19px;border-radius:50%;background:white;transition:left 0.2s;}
    
    /* スピークボタン */
    .speak-btn{background:rgba(78,205,196,0.12);border:1.5px solid rgba(78,205,196,0.4);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.18s;flex-shrink:0;font-size:18px;}
    .speak-btn:hover{background:rgba(78,205,196,0.25);}
    
    /* プログレスバー */
    .pb{background:rgba(255,255,255,0.07);border-radius:8px;height:6px;overflow:hidden;margin-bottom:14px;}
    .pb-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#4ECDC4,#F5C842);transition:width 0.35s ease;}
    
    /* バッジ */
    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
    
    /* カレンダー */
    .cal-day{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
    
    /* ランク表示 */
    .rank-badge{font-size:72px;font-weight:900;font-family:'Space Mono',monospace;animation:rankReveal 0.6s cubic-bezier(.17,.89,.32,1.28) forwards;display:block;}
    
    /* タイマー */
    .timer-danger{animation:timerPulse 0.5s ease infinite;}
  `;
  document.head.appendChild(s);
};

// ─── メインApp ─────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [data, setData] = useState(null);
  const [catFilter, setCatFilter] = useState("すべて");
  const [autoSpeak, setAutoSpeak] = useState(true);

  // 学習
  const [studyWords, setStudyWords] = useState([]);
  const [studyIdx, setStudyIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);

  // ゲーム状態
  const [quizWords, setQuizWords] = useState([]);
  const [quizIdx, setQuizIdx] = useState(0);
  const [choices, setChoices] = useState([]);
  const [selected, setSelected] = useState(null);
  const [okCount, setOkCount] = useState(0);
  const [combo, setCombo] = useState(0);
  const [maxCombo, setMaxCombo] = useState(0);
  const [hp, setHp] = useState(100);
  const [score, setScore] = useState(0);
  const [comboMsg, setComboMsg] = useState(null);
  const [quizResults, setQuizResults] = useState([]);
  const [isReview, setIsReview] = useState(false);
  const [timeLeft, setTimeLeft] = useState(null);
  const [timerOn, setTimerOn] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    injectStyles();
    // 音声ライブラリ事前ロード
    loadResponsiveVoice();
    if (window.speechSynthesis) window.speechSynthesis.getVoices();
    setData(loadData());
  }, []);

  const persist = useCallback(nd => { setData(nd); saveData(nd); }, []);

  const filtered = catFilter === "すべて" ? WORDS : WORDS.filter(w => w.category === catFilter);
  const cats = ["すべて","名詞","動詞","形容詞","副詞","前置詞","熟語"];

  // タイマー
  useEffect(() => {
    if (screen === "quiz" && timerOn && timeLeft !== null) {
      if (timeLeft <= 0) { handleTimeout(); return; }
      timerRef.current = setInterval(() => setTimeLeft(t => t - 1), 1000);
      return () => clearInterval(timerRef.current);
    }
  }, [screen, timerOn, timeLeft, quizIdx]);

  const handleTimeout = () => {
    clearInterval(timerRef.current);
    // タイムアウト=不正解扱い
    if (selected !== null) return;
    handleChoice(null, true);
  };

  // ── 学習 ────────────────────────────────────────────────────────
  const startStudy = (wordList = null) => {
    const words = shuffle(wordList || filtered).slice(0, QUIZ_COUNT);
    setStudyWords(words); setStudyIdx(0); setFlipped(false);
    setScreen("study");
    speak(words[0].en);
  };

  const nextStudy = () => {
    if (studyIdx < studyWords.length - 1) {
      const ni = studyIdx + 1;
      setStudyIdx(ni); setFlipped(false);
      speak(studyWords[ni].en);
    } else {
      const nd = { ...data };
      const d = todayStr();
      if (!nd.studiedWords) nd.studiedWords = {};
      studyWords.forEach(w => { nd.studiedWords[w.id] = (nd.studiedWords[w.id]||0)+1; });
      const ses = nd.sessions.find(s=>s.date===d&&s.type==="study");
      if (ses) ses.count=(ses.count||0)+studyWords.length;
      else nd.sessions.push({date:d,type:"study",count:studyWords.length});
      persist(nd); setScreen("home");
    }
  };

  // ── テスト開始 ────────────────────────────────────────────────────
  const startQuiz = (reviewMode = false, withTimer = false) => {
    let wl;
    if (reviewMode) {
      const mw = WORDS.filter(w => reviewableIds.includes(w.id));
      if (!mw.length) return;
      wl = shuffle(mw).slice(0, Math.min(QUIZ_COUNT, mw.length));
    } else {
      wl = shuffle(filtered).slice(0, QUIZ_COUNT);
    }
    setIsReview(reviewMode);
    setTimerOn(withTimer);
    setQuizWords(wl); setQuizIdx(0);
    setOkCount(0); setCombo(0); setMaxCombo(0);
    setHp(100); setScore(0); setComboMsg(null);
    setQuizResults([]); setSelected(null);
    setChoices(shuffle([wl[0], ...getWrong(wl[0], WORDS)]));
    if (withTimer) setTimeLeft(15);
    setScreen("quiz");
    speak(wl[0].en);
  };

  // ── 回答処理 ──────────────────────────────────────────────────────
  const handleChoice = (choice, timeout = false) => {
    if (selected !== null) return;
    clearInterval(timerRef.current);

    const cur = quizWords[quizIdx];
    const isOK = !timeout && choice && choice.id === cur.id;

    setSelected(timeout ? -1 : (choice?.id ?? -1));

    // スコア計算
    let pts = 0;
    if (isOK) {
      const newCombo = combo + 1;
      const newMax = Math.max(maxCombo, newCombo);
      pts = 100 + (newCombo >= 3 ? (newCombo - 2) * 20 : 0) + (timerOn && timeLeft > 10 ? 30 : timerOn && timeLeft > 5 ? 15 : 0);
      setOkCount(c => c + 1);
      setCombo(newCombo);
      setMaxCombo(newMax);
      setScore(s => s + pts);
      if (newCombo >= 3) {
        setComboMsg({ text: `${newCombo} COMBO! ${COMBO_MSGS[Math.min(newCombo-3, COMBO_MSGS.length-1)]}`, color: "#F5C842" });
        setTimeout(() => setComboMsg(null), 900);
      }
    } else {
      setCombo(0);
      const newHp = Math.max(0, hp - (timeout ? 15 : 10));
      setHp(newHp);
    }

    // 間違いリスト更新（正解しても自動クリアしない・フラグ制）
    const nd = { ...data };
    if (!nd.mistakeMap) nd.mistakeMap = {};
    if (!isOK) {
      const prev = nd.mistakeMap[cur.id];
      nd.mistakeMap[cur.id] = {
        addedDate: prev?.addedDate || todayStr(),
        count: (prev?.count || 0) + 1,
        mastered: false,
      };
    }
    // 正解しても削除しない。masterボタンでのみ削除
    setData(nd);

    setQuizResults(r => [...r, { word: cur, isOK, chosen: choice }]);

    const delay = isOK ? 700 : 1000;
    setTimeout(() => {
      if (quizIdx < quizWords.length - 1) {
        const ni = quizIdx + 1;
        const next = quizWords[ni];
        setChoices(shuffle([next, ...getWrong(next, WORDS)]));
        setQuizIdx(ni);
        setSelected(null);
        if (timerOn) setTimeLeft(15);
        speak(next.en);
      } else {
        // 最終スコア確定
        const finalOK = isOK ? okCount + 1 : okCount;
        const pct = Math.round((finalOK / quizWords.length) * 100);
        const finalScore = score + pts;
        nd.sessions = nd.sessions || [];
        nd.sessions.push({ date: todayStr(), type: "quiz", score: pct, gameScore: finalScore, total: quizWords.length, correct: finalOK, category: catFilter, review: isReview });
        if (!nd.bestScores) nd.bestScores = {};
        const key = isReview ? "review" : catFilter;
        if (!nd.bestScores[key] || finalScore > nd.bestScores[key]) nd.bestScores[key] = finalScore;
        persist(nd);
        setScore(finalScore);
        setOkCount(finalOK);
        setScreen("results");
      }
    }, delay);
  };

  if (!data) return (
    <div className="ek" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{color:"#4ECDC4",animation:"pulse 1.2s infinite",fontSize:18}}>⚡ 読み込み中…</div>
    </div>
  );

  // 未マスター語（data非null確定後に計算）
  const allMistakeIds = Object.entries(data.mistakeMap || {})
    .filter(([, v]) => !v.mastered)
    .map(([id]) => Number(id));
  const reviewableIds = allMistakeIds;
  const mistakeCount = allMistakeIds.length;
  const reviewCount = reviewableIds.length;

  // ══ ホーム ════════════════════════════════════════════════════════
  if (screen === "home") {
    const qs = data.sessions.filter(s=>s.type==="quiz");
    const last = qs.length ? qs[qs.length-1] : null;
    const bestKey = catFilter==="すべて"?"すべて":catFilter;
    const best = data.bestScores?.[bestKey] || 0;
    const streak = (() => {
      const dates = [...new Set(data.sessions.map(s=>s.date))].sort();
      let s=0; let d=new Date(todayStr());
      while(true){const ds=d.toISOString().slice(0,10);if(dates.includes(ds)){s++;d.setDate(d.getDate()-1);}else break;}
      return s;
    })();

    return (
      <div className="ek"><div className="screen">
        {/* ヒーロー */}
        <div className="home-hero">
          <div style={{fontSize:52,marginBottom:8}}>⚡</div>
          <h1 style={{fontFamily:"'Space Mono',monospace",fontSize:21,color:"#F5C842",margin:"0 0 4px",fontWeight:700}}>英検4級バトル</h1>
          <p style={{color:"#7B96B2",fontSize:12,margin:0}}>{WORDS.length}語収録 · 20問チャレンジ</p>
          <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:16}}>
            {[{v:streak,l:"連続",u:"日",c:"#F5C842"},{v:last?.score??"-",l:"最新",u:last?"点":""},{v:best||"-",l:"最高",u:best?"pt":"",c:"#A78BFA"}].map(x=>(
              <div key={x.l} style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:900,color:x.c||"#4ECDC4"}}>{x.v}<span style={{fontSize:11,color:"#7B96B2"}}>{x.u}</span></div>
                <div style={{fontSize:10,color:"#7B96B2"}}>{x.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* 苦手バナー */}
        {mistakeCount > 0 && (
          <div style={{background:"linear-gradient(135deg,rgba(167,139,250,0.12),rgba(124,58,237,0.08))",border:"1.5px solid rgba(167,139,250,0.35)",borderRadius:14,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:13,fontWeight:900,color:"#A78BFA"}}>🔁 苦手単語があります</div>
              <div style={{fontSize:11,color:"#7B96B2",marginTop:2}}>{mistakeCount}語 · 集中特訓しよう！</div>
            </div>
            <button className="btn btn-purple" style={{width:"auto",padding:"8px 14px",fontSize:12,marginBottom:0}} onClick={()=>startQuiz(true,false)}>特訓 ›</button>
          </div>
        )}

        {/* カテゴリ */}
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"12px 14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#F0F4FF",marginBottom:8}}>📂 カテゴリ</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {cats.map(c=>(
              <button key={c} className={`chip ${catFilter===c?"on":""}`} onClick={()=>setCatFilter(c)}>
                {c} <span style={{opacity:0.6}}>({c==="すべて"?WORDS.length:WORDS.filter(w=>w.category===c).length})</span>
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:"#7B96B2",marginTop:6}}>対象: {filtered.length}語</div>
        </div>

        {/* 読み上げ案内 */}
        <div style={{background:"rgba(78,205,196,0.06)",border:"1px solid rgba(78,205,196,0.2)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>🔊</span>
          <div style={{fontSize:12,color:"#7B96B2"}}>各単語の <strong style={{color:"#4ECDC4"}}>🔊ボタン</strong> をタップすると発音が聞けます</div>
        </div>

        {/* メインボタン群 */}
        <button className="btn btn-gold" onClick={()=>startQuiz(false,false)}>⚡ テストバトル（20問）</button>
        <button className="btn btn-teal" onClick={()=>startQuiz(false,true)}>⏱️ タイムアタック（15秒制限）</button>
        <button className="btn btn-ghost" onClick={()=>startStudy()}>📖 単語を学習する</button>
        {reviewCount>0 && <button className="btn btn-purple" onClick={()=>startQuiz(true,false)}>🔁 苦手テスト・復習（{reviewCount}語）</button>}
        <button className="btn btn-ghost" onClick={()=>setScreen("dashboard")}>📊 記録・ランキング</button>
        {mistakeCount>0 && <button className="btn btn-ghost" onClick={()=>setScreen("mistakes")}>🔁 苦手リスト（{mistakeCount}語）</button>}
      </div></div>
    );
  }

  // ══ 学習 ══════════════════════════════════════════════════════════
  if (screen === "study") {
    const word = studyWords[studyIdx];
    const prog = ((studyIdx+1)/studyWords.length)*100;
    const isMistake = !!(data.mistakeMap||{})[word.id] && !(data.mistakeMap||{})[word.id]?.mastered;
    return (
      <div className="ek"><div className="screen">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#7B96B2",cursor:"pointer",fontSize:13}}>← もどる</button>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {isMistake && <span style={{fontSize:10,color:"#A78BFA",fontWeight:700,background:"rgba(167,139,250,0.15)",padding:"2px 8px",borderRadius:8}}>苦手</span>}
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:"#7B96B2"}}>{studyIdx+1}/{studyWords.length}</span>
          </div>
        </div>
        <div className="pb"><div className="pb-fill" style={{width:`${prog}%`}}/></div>
        <p style={{textAlign:"center",color:"#7B96B2",fontSize:12,marginBottom:12}}>カードをタップして日本語を確認しよう</p>
        <div className="study-card pop-in" key={word.id} onClick={()=>{setFlipped(!flipped);if(!flipped)speak(word.en);}}>
          <span style={{background:"rgba(78,205,196,0.1)",color:"#4ECDC4",padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700}}>{word.category}</span>
          {!flipped ? (
            <><p style={{fontFamily:"'Space Mono',monospace",fontSize:32,fontWeight:700,color:"#F0F4FF",margin:0}}>{word.en}</p>
            <p style={{color:"#7B96B2",fontSize:12,margin:0}}>タップして確認 👆</p></>
          ) : (
            <><p style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:700,color:"#F5C842",margin:0}}>{word.en}</p>
            <p style={{fontSize:28,fontWeight:900,color:"#4ECDC4",margin:"8px 0 0"}}>{word.ja}</p></>

        </div>
        <div style={{display:"flex",justifyContent:"center",margin:"12px 0"}}>

      </div></div>
    );
  }

  // ══ テスト（ゲーム） ══════════════════════════════════════════════
  if (screen === "quiz") {
    const word = quizWords[quizIdx];
    const prog = (quizIdx/quizWords.length)*100;
    const hpColor = hp>60?"#4ECDC4":hp>30?"#F5C842":"#FF6B6B";

    return (
      <div className="ek">
        {comboMsg && (
          <div className="combo-pop" style={{color:comboMsg.color}}>{comboMsg.text}</div>
        )}
        <div className="screen">
          {/* HUD */}
          <div className="hud">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <button onClick={()=>{clearInterval(timerRef.current);setScreen("home");}} style={{background:"none",border:"none",color:"#7B96B2",cursor:"pointer",fontSize:12}}>✕ やめる</button>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                {isReview && <span style={{fontSize:10,color:"#A78BFA",fontWeight:700}}>🔁復習</span>}
                {combo>=3 && <span style={{fontSize:12,color:"#F5C842",fontWeight:900,textShadow:"0 0 10px rgba(245,200,66,0.5)"}}>{combo}🔥</span>}
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#F5C842",fontWeight:700}}>+{score}pt</span>
              </div>
            </div>
            {/* HP */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:11,color:"#7B96B2",width:20}}>HP</span>
              <div className="hp-bar-wrap" style={{flex:1}}>
                <div className="hp-bar" style={{width:`${hp}%`,background:hpColor}}/>
              </div>
              <span style={{fontSize:11,color:hpColor,fontWeight:700,width:30,textAlign:"right"}}>{hp}</span>
            </div>
            {/* 問題進捗 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#7B96B2"}}>{quizIdx+1}/{quizWords.length}問</span>
              {timerOn && (
                <span className={timeLeft<=5?"timer-danger":""} style={{fontFamily:"'Space Mono',monospace",fontSize:16,fontWeight:700,color:timeLeft<=5?"#FF6B6B":"#4ECDC4"}}>
                  ⏱{timeLeft}
                </span>

              <span style={{fontSize:11,color:"#7B96B2"}}>正解 {okCount}問</span>

            {timerOn && (
              <div className="pb" style={{marginBottom:0,marginTop:6,height:4}}>
                <div className="pb-fill" style={{width:`${(timeLeft/15)*100}%`,background:timeLeft<=5?"#FF6B6B":undefined,transition:"width 1s linear"}}/>
              </div>
            )}
          </div>

          {/* 問題 */}
          <div className="q-card pop-in" key={word.id}>
            <span style={{background:"rgba(78,205,196,0.1)",color:"#4ECDC4",padding:"2px 10px",borderRadius:20,fontSize:10,fontWeight:700,display:"inline-block",marginBottom:10}}>{word.category}</span>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
              <p style={{fontFamily:"'Space Mono',monospace",fontSize:30,fontWeight:700,color:"#F5C842",margin:0,lineHeight:1.2}}>{word.en}</p>
              <SpeakBtn text={word.en} />
            </div>
            <p style={{color:"#7B96B2",fontSize:12,margin:"8px 0 0"}}>日本語の意味を選ぼう</p>
          </div>

          {/* 選択肢 */}
          <div key={`choices-${quizIdx}`}>
            {choices.map((c,i) => {
              let cls = "choice";
              if (selected !== null) {
                if (c.id === word.id) cls += " correct";
                else if (c.id === selected) cls += " wrong";
              }
              return (
                <button key={c.id} className={cls} onClick={()=>handleChoice(c)} disabled={selected!==null}>
                  <span style={{color:"rgba(255,255,255,0.3)",marginRight:10,fontFamily:"'Space Mono',monospace",fontSize:12}}>
                    {["A","B","C","D"][i]}

                  {selected!==null&&c.id===word.id&&" ✓"}

          </div>
        </div>
      </div>
    );
  }

  // ══ 結果 ══════════════════════════════════════════════════════════
  if (screen === "results") {
    const pct = Math.round((okCount/quizWords.length)*100);
    const rank = getRank(pct);
    const mistakes = quizResults.filter(r=>!r.isOK);
    const isBest = data.bestScores?.[isReview?"review":catFilter] === score;

    return (
      <div className="ek"><div className="screen" style={{textAlign:"center"}}>
        {/* ランク */}
        <div style={{background:rank.bg,border:`2px solid ${rank.color}`,borderRadius:24,padding:"28px 20px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          {isBest && <div style={{position:"absolute",top:10,right:14,fontSize:11,fontWeight:900,color:"#F5C842",background:"rgba(245,200,66,0.15)",padding:"2px 8px",borderRadius:8}}>🏆 NEW BEST!</div>}
          <div style={{fontSize:11,color:"#7B96B2",marginBottom:4}}>ランク</div>
          <span className="rank-badge" style={{color:rank.color}}>{rank.label}</span>
          <div style={{fontSize:22,marginBottom:4}}>{rank.emoji}</div>
          <div style={{fontFamily:"'Space Mono',monospace",fontSize:48,fontWeight:700,color:rank.color,lineHeight:1}}>{pct}<span style={{fontSize:16}}>%</span></div>
          <div style={{color:"#7B96B2",fontSize:13}}>{okCount}/{quizWords.length}問正解</div>
          <div style={{display:"flex",justifyContent:"center",gap:20,marginTop:14}}>
            <div><div style={{fontSize:18,fontWeight:900,color:"#F5C842"}}>{score}<span style={{fontSize:11}}>pt</span></div><div style={{fontSize:10,color:"#7B96B2"}}>スコア</div></div>
            <div><div style={{fontSize:18,fontWeight:900,color:"#4ECDC4"}}>{maxCombo}🔥</div><div style={{fontSize:10,color:"#7B96B2"}}>最大コンボ</div></div>
            <div><div style={{fontSize:18,fontWeight:900,color:"#A78BFA"}}>{quizWords.length-okCount}<span style={{fontSize:11}}>問</span></div><div style={{fontSize:10,color:"#7B96B2"}}>ミス</div></div>
          </div>
        </div>

        {/* 間違い単語 — 苦手リストに蓄積、覚えたボタンで個別削除 */}
        {mistakes.length > 0 && (
          <div style={{background:"rgba(255,107,107,0.07)",border:"1.5px solid rgba(255,107,107,0.2)",borderRadius:16,padding:"14px 16px",marginBottom:16,textAlign:"left"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#FF6B6B",marginBottom:4}}>❌ 間違えた単語（{mistakes.length}語）</div>
            <div style={{fontSize:10,color:"#7B96B2",marginBottom:10}}>苦手リストに追加されました。「覚えた！」を押すまで残ります</div>
            {mistakes.map((r,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<mistakes.length-1?"1px solid rgba(255,255,255,0.05)":"none"}}>
                <button style={{background:"none",border:"none",cursor:"pointer",fontSize:15,padding:0,flexShrink:0}} onClick={()=>speak(r.word.en)}>🔊</button>
                <div style={{flex:1,minWidth:0}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#F0F4FF",fontWeight:700}}>{r.word.en}</span>
                  <span style={{color:"#7B96B2",fontSize:11,marginLeft:6}}>= {r.word.ja}</span>
                  <div style={{fontSize:10,color:"#7B96B2"}}>累計ミス: {(data.mistakeMap||{})[r.word.id]?.count||1}回</div>
                </div>
                <button
                  onClick={()=>{
                    const nd={...data,mistakeMap:{...data.mistakeMap,[r.word.id]:{...data.mistakeMap?.[r.word.id],mastered:true}}};
                    persist(nd);
                  }}
                  style={{background:"rgba(78,205,196,0.12)",border:"1.5px solid rgba(78,205,196,0.35)",borderRadius:8,padding:"4px 10px",color:"#4ECDC4",cursor:"pointer",fontSize:11,fontWeight:700,flexShrink:0,fontFamily:"'Nunito',sans-serif"}}
                >
                  ✓ 覚えた！
                </button>
              </div>
            ))}
          </div>
        )}

        {/* 全問結果 */}
        <details style={{marginBottom:16,textAlign:"left"}}>
          <summary style={{cursor:"pointer",color:"#7B96B2",fontSize:12,padding:"8px 0"}}>全{quizWords.length}問の結果を見る</summary>
          {quizResults.map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:0}} onClick={()=>speak(r.word.en)}>🔊</button>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,color:"#F0F4FF"}}>{r.word.en}</span>
                <span style={{color:"#7B96B2",fontSize:10}}>= {r.word.ja}</span>
              </div>
              <span style={{fontSize:16}}>{r.isOK?"✅":"❌"}</span>
            </div>
          ))}
        </details>

        <button className="btn btn-gold" onClick={()=>startQuiz(false,false)}>⚡ もう一度バトル</button>
        <button className="btn btn-teal" onClick={()=>startQuiz(false,true)}>⏱️ タイムアタック</button>
        {reviewCount>0 && <button className="btn btn-purple" onClick={()=>startQuiz(true,false)}>🔁 苦手テスト（{reviewCount}語）</button>}
        {mistakes.length>0 && <button className="btn btn-ghost" onClick={()=>startStudy(mistakes.map(r=>r.word))}>📖 間違い単語を学習</button>}
        <button className="btn btn-ghost" onClick={()=>setScreen("home")}>🏠 ホームへ</button>
      </div></div>
    );
  }

  // ══ 苦手リスト画面 ════════════════════════════════════════════════
  if (screen === "mistakes") {
    const mistakeWords = WORDS.filter(w => allMistakeIds.includes(w.id))
      .sort((a,b) => ((data.mistakeMap[b.id]?.count||0) - (data.mistakeMap[a.id]?.count||0)));
    const masteredWords = WORDS.filter(w => {
      const m = data.mistakeMap?.[w.id];
      return m && m.mastered;
    });

    const markMastered = (wordId) => {
      const nd = {...data, mistakeMap: {...data.mistakeMap, [wordId]: {...data.mistakeMap[wordId], mastered: true}}};
      persist(nd);
    };
    const unmarkMastered = (wordId) => {
      const nd = {...data, mistakeMap: {...data.mistakeMap, [wordId]: {...data.mistakeMap[wordId], mastered: false}}};
      persist(nd);
    };

    return (
      <div className="ek"><div className="screen">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#7B96B2",cursor:"pointer",fontSize:13}}>← もどる</button>
          <h2 style={{margin:0,fontFamily:"'Space Mono',monospace",fontSize:17,color:"#A78BFA"}}>🔁 苦手リスト</h2>
        </div>

        {/* サマリー */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          <div className="stat-box">
            <div style={{fontSize:10,color:"#7B96B2",marginBottom:2}}>未マスター</div>
            <div style={{fontSize:28,fontWeight:900,color:"#FF6B6B"}}>{mistakeWords.length}<span style={{fontSize:11,color:"#7B96B2"}}>語</span></div>
          </div>
          <div className="stat-box">
            <div style={{fontSize:10,color:"#7B96B2",marginBottom:2}}>マスター済み</div>
            <div style={{fontSize:28,fontWeight:900,color:"#4ECDC4"}}>{masteredWords.length}<span style={{fontSize:11,color:"#7B96B2"}}>語</span></div>
          </div>
        </div>

        {mistakeWords.length > 0 && (
          <>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button className="btn btn-purple" style={{fontSize:13}} onClick={()=>startStudy(mistakeWords)}>📖 まとめて学習</button>
              <button className="btn btn-purple" style={{fontSize:13}} onClick={()=>startQuiz(true,false)}>⚡ 苦手テスト</button>
            </div>

            <div style={{background:"rgba(167,139,250,0.06)",borderRadius:14,border:"1px solid rgba(167,139,250,0.2)",overflow:"hidden",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid rgba(167,139,250,0.15)"}}>
                <span style={{fontSize:12,fontWeight:700,color:"#A78BFA"}}>未マスター ({mistakeWords.length}語) — ミス回数順</span>
                <button onClick={()=>{const nd={...data,mistakeMap:{}};persist(nd);}} style={{background:"none",border:"1px solid #7B96B2",borderRadius:6,padding:"2px 8px",color:"#7B96B2",cursor:"pointer",fontSize:10}}>全削除</button>
              </div>
              {mistakeWords.map((w, i) => {
                const info = data.mistakeMap[w.id] || {};
                return (
                  <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderBottom:i<mistakeWords.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
                    <button style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:0,flexShrink:0}} onClick={()=>speak(w.en)}>🔊</button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontFamily:"'Space Mono',monospace",fontSize:14,color:"#F0F4FF",fontWeight:700}}>{w.en}</span>
                        <span style={{fontSize:12,color:"#7B96B2"}}>= {w.ja}</span>
                      </div>
                      <div style={{fontSize:10,color:"#7B96B2",marginTop:2}}>
                        <span style={{color:"#FF6B6B",fontWeight:700}}>ミス {info.count||1}回</span>
                        <span style={{marginLeft:6}}>{w.category}</span>
                        <span style={{marginLeft:6}}>初回: {info.addedDate||"-"}</span>
                      </div>
                    </div>
                    <button
                      onClick={()=>markMastered(w.id)}
                      style={{background:"rgba(78,205,196,0.1)",border:"1.5px solid rgba(78,205,196,0.35)",borderRadius:8,padding:"5px 10px",color:"#4ECDC4",cursor:"pointer",fontSize:11,fontWeight:700,flexShrink:0,fontFamily:"'Nunito',sans-serif"}}
                    >✓ 覚えた！</button>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {mistakeWords.length === 0 && (
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:48,marginBottom:12}}>🎉</div>
            <div style={{fontSize:16,fontWeight:700,color:"#4ECDC4"}}>苦手リストが空です！</div>
            <div style={{fontSize:12,color:"#7B96B2",marginTop:6}}>テストで間違えた単語がここに追加されます</div>
          </div>
        )}

        {/* マスター済み */}
        {masteredWords.length > 0 && (
          <div style={{background:"rgba(78,205,196,0.04)",borderRadius:14,border:"1px solid rgba(78,205,196,0.15)",overflow:"hidden",marginBottom:16}}>
            <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(78,205,196,0.1)"}}>
              <span style={{fontSize:12,fontWeight:700,color:"#4ECDC4"}}>✅ マスター済み ({masteredWords.length}語)</span>
            </div>
            {masteredWords.map((w, i) => (
              <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderBottom:i<masteredWords.length-1?"1px solid rgba(255,255,255,0.03)":"none",opacity:0.7}}>
                <button style={{background:"none",border:"none",cursor:"pointer",fontSize:14,padding:0,flexShrink:0}} onClick={()=>speak(w.en)}>🔊</button>
                <div style={{flex:1,minWidth:0}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#F0F4FF",fontWeight:700}}>{w.en}</span>
                  <span style={{fontSize:11,color:"#7B96B2",marginLeft:6}}>= {w.ja}</span>
                </div>
                <button
                  onClick={()=>unmarkMastered(w.id)}
                  style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"3px 8px",color:"#7B96B2",cursor:"pointer",fontSize:10,fontFamily:"'Nunito',sans-serif"}}
                >戻す</button>
              </div>
            ))}
          </div>
        )}
      </div></div>
    );
  }

  // ══ ダッシュボード ════════════════════════════════════════════════
  if (screen === "dashboard") {
    const qs = data.sessions.filter(s=>s.type==="quiz");
    const allDates = [...new Set(data.sessions.map(s=>s.date))].sort();
    let streak=0; let chk=new Date(todayStr());
    while(true){const ds=chk.toISOString().slice(0,10);if(allDates.includes(ds)){streak++;chk.setDate(chk.getDate()-1);}else break;}
    const avg = qs.length ? Math.round(qs.reduce((s,q)=>s+q.score,0)/qs.length) : 0;
    const totalPts = qs.reduce((s,q)=>s+(q.gameScore||0),0);
    const mistakeWords = WORDS.filter(w => allMistakeIds.includes(w.id)).sort((a,b)=>((data.mistakeMap[b.id]?.count||0)-(data.mistakeMap[a.id]?.count||0)));
    const last7 = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().slice(0,10);});
    const recentQ = qs.slice(-10);
    const now=new Date(); const yr=now.getFullYear(),mo=now.getMonth();
    const dim=new Date(yr,mo+1,0).getDate(), fd=new Date(yr,mo,1).getDay();
    const moDates=data.sessions.map(s=>s.date);
    const today=todayStr();

    return (
      <div className="ek"><div className="screen">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",color:"#7B96B2",cursor:"pointer",fontSize:13}}>← もどる</button>
          <h2 style={{margin:0,fontFamily:"'Space Mono',monospace",fontSize:17,color:"#F5C842"}}>📊 記録</h2>
        </div>

        <div className="stat-grid">
          {[
            {icon:"🔥",l:"連続学習",v:streak,u:"日"},
            {icon:"⭐",l:"平均スコア",v:avg,u:"点"},
            {icon:"💎",l:"総獲得pt",v:totalPts.toLocaleString(),u:""},
            {icon:"🔁",l:"苦手単語",v:mistakeWords.length,u:"語",c:"#A78BFA"},
          ].map(s=>(
            <div key={s.l} className="stat-box">
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                <span style={{fontSize:18}}>{s.icon}</span>
                <span style={{fontSize:10,color:"#7B96B2"}}>{s.l}</span>
              </div>
              <div style={{fontSize:24,fontWeight:900,color:s.c||"#F5C842"}}>{s.v}<span style={{fontSize:11,color:"#7B96B2"}}>{s.u}</span></div>
            </div>
          ))}
        </div>

        {/* スコア推移 */}
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:12}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#F0F4FF"}}>📈 スコア推移</p>
          {recentQ.length===0 ? <p style={{color:"#7B96B2",fontSize:12,textAlign:"center"}}>まだテストがありません</p> : (
            <>
              <div style={{display:"flex",alignItems:"flex-end",gap:3,height:68}}>
                {recentQ.map((s,i)=>{
                  const rank=getRank(s.score);
                  return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <span style={{fontSize:8,color:rank.color,fontWeight:700}}>{s.score}</span>
                    <div style={{width:"100%",height:`${(s.score/100)*50}px`,borderRadius:"3px 3px 0 0",background:rank.color,minHeight:3,opacity:s.review?0.6:1}}/>
                  </div>;
                })}
              </div>
              <div style={{display:"flex",gap:3,marginTop:3}}>
                {recentQ.map((s,i)=><div key={i} style={{flex:1,fontSize:7,color:"#7B96B2",textAlign:"center"}}>{s.date.slice(5)}</div>)}
              </div>
            </>
          )}
        </div>

        {/* 直近7日 */}
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:12}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#F0F4FF"}}>📅 直近7日</p>
          <div style={{display:"flex",gap:5,justifyContent:"space-between"}}>
            {last7.map(d=>{
              const hasSt=data.sessions.some(s=>s.date===d&&s.type==="study");
              const hasQz=data.sessions.some(s=>s.date===d&&s.type==="quiz");
              const isT=d===today;
              return <div key={d} style={{flex:1,textAlign:"center"}}>
                <div style={{fontSize:9,color:"#7B96B2",marginBottom:2}}>{["日","月","火","水","木","金","土"][new Date(d).getDay()]}</div>
                <div className="cal-day" style={{margin:"0 auto",background:hasSt&&hasQz?"#F5C842":hasSt?"#4ECDC4":hasQz?"#FF6B6B":"rgba(255,255,255,0.05)",color:(hasSt||hasQz)?"#0a1020":"#7B96B2",border:isT?"2px solid #F5C842":"2px solid transparent"}}>
                  {parseInt(d.slice(8))}
                </div>
              </div>;
            })}
          </div>
        </div>

        {/* 今月 */}
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:12}}>
          <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#F0F4FF"}}>🗓️ {yr}年{mo+1}月</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {["日","月","火","水","木","金","土"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"#7B96B2",paddingBottom:2}}>{d}</div>)}
            {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:dim},(_,i)=>{
              const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
              const done=moDates.includes(ds),isT=ds===today;
              return <div key={i} style={{textAlign:"center",fontSize:10,padding:"3px 0",borderRadius:5,background:done?"#F5C842":isT?"rgba(245,200,66,0.1)":"transparent",color:done?"#0a1020":isT?"#F5C842":"#7B96B2",fontWeight:done||isT?700:400,border:isT&&!done?"1px solid #F5C842":"1px solid transparent"}}>{i+1}</div>;
            })}
          </div>
        </div>

        {/* 苦手単語 */}
        {mistakeWords.length>0 && (
          <div style={{background:"rgba(167,139,250,0.06)",borderRadius:14,padding:"14px",border:"1px solid rgba(167,139,250,0.2)",marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:"#A78BFA"}}>🔁 苦手単語（{mistakeWords.length}語）</p>
              <button onClick={()=>{const nd={...data,mistakeMap:{}};persist(nd);}} style={{background:"none",border:"1px solid #7B96B2",borderRadius:8,padding:"2px 8px",color:"#7B96B2",cursor:"pointer",fontSize:10}}>全リセット</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
              {mistakeWords.map(w=>{
                const info = data.mistakeMap[w.id] || {};
                return (
                  <div key={w.id} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(167,139,250,0.07)",border:"1px solid rgba(167,139,250,0.18)",borderRadius:10,padding:"8px 12px"}}>
                    <button style={{background:"none",border:"none",cursor:"pointer",fontSize:15,padding:0,flexShrink:0}} onClick={()=>speak(w.en)}>🔊</button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                        <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:"#A78BFA",fontWeight:700}}>{w.en}</span>
                        <span style={{fontSize:11,color:"#7B96B2"}}>= {w.ja}</span>
                      </div>
                      <div style={{fontSize:10,color:"#7B96B2",marginTop:1}}>
                        {w.category} · ミス {info.count||1}回 · {info.addedDate||""}
                      </div>
                    </div>
                    <button
                      onClick={()=>{
                        const nd={...data,mistakeMap:{...data.mistakeMap,[w.id]:{...data.mistakeMap[w.id],mastered:true}}};
                        persist(nd);
                      }}
                      style={{background:"rgba(78,205,196,0.12)",border:"1.5px solid rgba(78,205,196,0.35)",borderRadius:8,padding:"4px 10px",color:"#4ECDC4",cursor:"pointer",fontSize:11,fontWeight:700,flexShrink:0,fontFamily:"'Nunito',sans-serif"}}
                    >
                      ✓ 覚えた！
                    </button>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-purple" style={{fontSize:12}} onClick={()=>startStudy(mistakeWords)}>📖 学習</button>
              <button className="btn btn-purple" style={{fontSize:12}} onClick={()=>startQuiz(true,false)}>⚡ テスト</button>
            </div>
          </div>
        )}

        {/* テスト履歴 */}
        {qs.length>0 && (
          <div style={{background:"rgba(255,255,255,0.03)",borderRadius:14,padding:"14px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:12}}>
            <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:"#F0F4FF"}}>📋 テスト履歴</p>
            {qs.slice(-8).reverse().map((s,i)=>{
              const r=getRank(s.score);
              return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<Math.min(7,qs.length-1)?"1px solid rgba(255,255,255,0.04)":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:"#7B96B2"}}>{s.date}</span>
                  {s.review&&<span className="badge" style={{background:"rgba(167,139,250,0.15)",color:"#A78BFA"}}>復習</span>}
                  {s.category&&s.category!=="すべて"&&<span className="badge" style={{background:"rgba(78,205,196,0.1)",color:"#4ECDC4"}}>{s.category}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {s.gameScore&&<span style={{fontSize:11,color:"#7B96B2"}}>{s.gameScore}pt</span>}
                  <span className="badge" style={{background:r.bg,color:r.color,fontSize:12}}>{r.label} {s.score}%</span>
                </div>
              </div>;
            })}
          </div>
        )}

        <button className="btn btn-gold" onClick={()=>startQuiz(false,false)}>⚡ テストバトル</button>
      </div></div>
    );
  }

  return null;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
